id: '0682'
sortKey: 500600
severity: minor
target: product
platform:
- web
check:
  ja: |-
    ページ上のすべてのコンテンツが、ARIAランドマークによって示される適切な領域に配置されている。
  en: |-
    All content on the page is placed in the appropriate area indicated by ARIA landmarks.
conditions:
- platform: web
  type: simple
  tool: axe
  id: "0682-axe-01"
  procedure:
    ja: |-
      画面上に表示されているコンテンツに対して、axe DevToolsで以下の問題が発生しない。（非表示箇所に対して以下の問題が発生しても、通常は問題ない。）

      -  :ref:`axe-rule-region`
    en: |-
      The following issue is not reported by axe DevTools against visible content.  (There usually is no problem if this issue is reported against hidden content.)

      -  :ref:`axe-rule-region`
