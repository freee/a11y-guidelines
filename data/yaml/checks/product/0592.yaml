id: '0592'
sortKey: 502700
severity: critical
target: product
platform:
- web
- mobile
check:
  ja: |-
    状態を表現するもの（例：選択状態、展開/折りたたみ状態など）がある場合、スクリーン・リーダーでその状態を読み取れる。
  en: |-
    If there are elements expressing state (e.g., selected state, expanded/collapsed state), the screen reader can identify that state.
conditions:
- platform: general
  type: or
  conditions:
  - type: simple
    tool: misc
    id: "0592-content-00"
    procedure:
      ja: |-
        チェック対象の画面には、状態を表現するコンポーネント（選択状態、展開/折りたたみ状態など）が存在しない。
      en: |-
        There are no state-expressing (selected state, expanded/collapsed state, etc.) components on the screen to be checked.
  - type: simple
    tool: nvda
    id: "0592-nvda-01"
    procedure:
      ja: |-
        スクリーン・リーダーで状態を持つコンポーネント（選択状態、展開/折りたたみ状態など）を読み上げたとき、その状態が分かる。
      en: |-
        When the screen reader reads a component with state (selected state, expanded/collapsed state, etc.), users can understand that state.
